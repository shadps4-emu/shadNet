# worlds.cfg — matchmaking world layout, per game.
#
# Two sections:
#
# [groups]  maps a title id (CUSAxxxxx, no dash, as the client reports it from
#           param.sfo TITLE_ID) to a shared matching group. Titles in the same
#           group share one room pool / world list (regional or re-release
#           variants of the same game). A title id not listed here keys by its
#           own title id (isolated).
#
# [worlds]  declares the worlds for a group (or for a bare title id used as its
#           own group). Format:
#               GROUP | WORLD_ID | SERVER_ID | LOBBIES_NUM | MAX_LOBBY_MEMBERS
#           Live room / member counts are filled in at request time.
#
# If this file is absent, GetWorldInfoList returns a single default world.

[groups]
# Bloodborne — all regional / re-release SKUs share the "bloodborne" pool.
CUSA00207 = bloodborne
CUSA00208 = bloodborne
CUSA00299 = bloodborne
CUSA00900 = bloodborne
CUSA01363 = bloodborne
CUSA03014 = bloodborne
CUSA03023 = bloodborne
CUSA03173 = bloodborne
CUSA03179 = bloodborne

[worlds]
bloodborne | 1 | 1 | 0 | 0
